<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Banff Crew Planner</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <div class="app-shell">
      <header class="trip-hero">
        <img src="banff-hero.png" alt="Banff mountain lake" />
        <div class="hero-overlay"></div>

        <nav class="topbar" aria-label="Trip navigation">
          <strong>Banff Crew</strong>
          <div class="top-actions">
            <span class="sync-status" id="syncStatus">Connecting</span>
            <button class="ghost-button" id="copyPlanButton" type="button">Share Summary</button>
          </div>
        </nav>

        <section class="hero-content" aria-labelledby="trip-title">
          <div>
            <p class="eyebrow">A shared trip board for friends</p>
            <h1 id="trip-title">Banff 5-Day Trip</h1>
            <p class="hero-copy">Plan the schedule, packing list, budget, and owners in one place.</p>
          </div>

          <form class="quick-add" id="activityForm">
            <label>
              Date
              <select id="dayInput" aria-label="Choose date"></select>
            </label>
            <label>
              Time
              <input id="timeInput" type="time" value="09:00" required />
            </label>
            <label>
              Activity
              <input id="titleInput" type="text" placeholder="Lake Louise walk" required />
            </label>
            <label>
              Driver
              <input id="ownerInput" type="text" placeholder="Yubin" />
            </label>
            <button type="submit">Add Activity</button>
          </form>
        </section>
      </header>

      <main>
        <section class="overview-grid" aria-label="Trip summary">
          <article class="stat-panel">
            <span>Confirmed Plans</span>
            <strong id="activityCount">0</strong>
          </article>
          <article class="stat-panel">
            <span>Friends</span>
            <strong id="friendCount">0</strong>
          </article>
          <article class="stat-panel">
            <span>Estimated Total</span>
            <strong id="totalCost">$0</strong>
          </article>
          <article class="stat-panel">
            <span>Per Person</span>
            <strong id="perPersonCost">$0</strong>
          </article>
        </section>

        <section class="workspace-grid">
          <section class="panel schedule-panel" aria-labelledby="schedule-heading">
            <div class="panel-heading">
              <div>
                <p class="eyebrow">Timeline</p>
                <h2 id="schedule-heading">Daily Schedule</h2>
              </div>
              <div class="segmented" id="dayTabs" aria-label="Date filter"></div>
            </div>
            <div class="timeline" id="timeline"></div>
          </section>

          <aside class="side-stack">
            <section class="panel" aria-labelledby="friends-heading">
              <div class="panel-heading compact">
                <div>
                  <p class="eyebrow">Crew</p>
                  <h2 id="friends-heading">Friends</h2>
                </div>
              </div>
              <form class="inline-form" id="friendForm">
                <input id="friendInput" type="text" placeholder="Add a name" required />
                <button type="submit">Add</button>
              </form>
              <div class="friend-list" id="friendList"></div>
            </section>

            <section class="panel" aria-labelledby="packing-heading">
              <div class="panel-heading compact">
                <div>
                  <p class="eyebrow">Packing</p>
                  <h2 id="packing-heading">Shared Packing</h2>
                </div>
              </div>
              <form class="inline-form" id="packingForm">
                <input id="packingInput" type="text" placeholder="Bear spray, thermos..." required />
                <button type="submit">Add</button>
              </form>
              <div class="check-list" id="packingList"></div>
            </section>

            <section class="panel" aria-labelledby="budget-heading">
              <div class="panel-heading compact">
                <div>
                  <p class="eyebrow">Budget</p>
                  <h2 id="budget-heading">Costs</h2>
                </div>
              </div>
              <form class="budget-form" id="budgetForm">
                <input id="budgetNameInput" type="text" placeholder="Rental car" required />
                <input id="budgetAmountInput" type="number" min="0" step="1" placeholder="320" required />
                <button type="submit">Add</button>
              </form>
              <div class="budget-list" id="budgetList"></div>
            </section>
          </aside>
        </section>
      </main>

      <div class="toast" id="toast" role="status" aria-live="polite"></div>
    </div>

    <script type="module" src="app.js"></script>
  </body>
</html>
